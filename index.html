<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>akerson</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Martian+Mono:wght@300;400&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      background: #f5f2eb;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Martian Mono', monospace;
    }

    .container {
      text-align: center;
      opacity: 0;
      animation: appear 1.2s ease forwards;
      animation-delay: 0.3s;
    }

    @keyframes appear {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .name {
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      font-weight: 400;
      letter-spacing: 0.18em;
      color: #2a2520;
    }

    .divider {
      width: 32px;
      height: 1px;
      background: #bbb49e;
      margin: 1.4rem auto;
    }

    .note {
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: #9a9080;
      line-height: 1.9;
    }

    .note a {
      color: inherit;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: #c8bfaf;
      transition: color 0.2s;
    }

    .note a:hover {
      color: #5a5040;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="name">akerson</div>
    <div class="divider"></div>
    <div class="note">
      nothing here.<br/>
      projects live in subdirectories.
    </div>
  </div>
</body>
</html>
